name: kit-push-guard

# スタック層の正（このリポジトリ）への PR を検査する。ruleset `protect-main` の
# required status check として参照されるため、ジョブ ID は変更しないこと。
#
# 検査は2つ。
#
# 1. 鮮度: マニフェスト掲載ファイルに触れる PR は、HEAD コミットの
#    `Stack-Kit-Base:` トレーラ（push する側の base.txt の値）が
#    このリポジトリの main HEAD と一致していること。
#
#    「PR ブランチが main に追随しているか」だけでは事故を検知できない。最新の
#    main から切ったブランチに古いコピーを載せても祖先関係は最新のままで、
#    他プロジェクトが反映済みの変更が静かに巻き戻る。押す側が「どの時点の kit を
#    取り込んだ状態でコピーしたか」はトレーラでしか表明できない。
#    トレーラ欠落 = push スキルを踏んでいない、も同時に弾ける。
#
#    このリポジトリは Template repository を兼ねるため、巻き戻された内容は以降
#    template から作られる新規プロジェクト全部の初期状態になる。
#
#    マニフェスト外のファイル（このリポジトリ自身の src/・ci.yml・このワークフロー
#    自身）は丸ごとコピーされる経路が無く、ロストアップデートが起きない。そこまで
#    トレーラを要求すると、core の pull ワークフローが立てる自動 PR（bot コミット・
#    トレーラ無し）が永久にマージ不能になり、core の更新を受け取れなくなる。
#
# 2. 混入: 配布対象ファイルの追加行にコピー元プロジェクト固有名が無いこと。検査する
#    のは配布ペイロードだけで、配布されないファイル（src/・設計文書・このワークフロー
#    自身）は見ない。そこまで見ると、経緯としてプロジェクト名に言及する正当な設計文書
#    のたびに赤くなり、Kit-Grep-Mention が常態化して検査が形骸化する。既存行も見ない
#    （正当なヒットを含むファイルがあり、ファイル全体の grep は初回から赤くなるため）。
#    正当な追加（禁止語パターンの定義そのもの・位置づけ図での consumer 列挙）は
#    HEAD コミットに `Kit-Grep-Mention: <理由>` を付けて宣言すると警告に降格する。
#    「例外を通す」のではなく「この語は言及であって依存ではない」と表明するもの。
#
#    core 側の grep と対象語が異なる。スタック層は Hono / Supabase を含んで当然で
#    あり、弾くべきなのはプロジェクト固有名のみ。
#
# このファイルはマニフェストに載せない（consumer へ配布しない）。実際に走るのは
# kit リポジトリだけであり、配ると全 consumer が絶対に使わないワークフローを持つ。

on:
  pull_request:
    branches: [main]

jobs:
  kit-push-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # 既定の checkout は main とのマージコミットを指す。トレーラは PR の
          # HEAD コミットに付くので、明示的に head を取る。
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Guard
        env:
          TRAILER: Stack-Kit-Base
          MANIFEST: .claude/manifests/stack-kit-files.txt
          SCOPE: .kit-push-review-scope.json
          FORBIDDEN: 'ai-todo|hono-user-point|cloudflare-actions'
        run: |
          set -euo pipefail

          git fetch origin main -q
          main_sha=$(git rev-parse origin/main)
          base_ref=$(git merge-base origin/main HEAD)
          fail=0

          if [ ! -f "$MANIFEST" ]; then
            echo "::error::$MANIFEST が見つかりません"
            exit 1
          fi

          # マニフェストの行は「1行1パス」。末尾が / の行はそのディレクトリ配下を
          # 再帰対象とする（pull ワークフローと同じ解釈）。
          in_manifest() {
            local p="$1" entry
            while IFS= read -r entry; do
              [ -z "$entry" ] && continue
              case "$entry" in
                */) case "$p" in "$entry"*) return 0 ;; esac ;;
                *)  [ "$p" = "$entry" ] && return 0 ;;
              esac
            done < "$MANIFEST"
            return 1
          }

          # ---- 1. 鮮度 ----
          scoped=()
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            if in_manifest "$p"; then
              echo "配布対象ファイルの変更: $p"
              scoped+=("$p")
            fi
          done < <(git diff --name-only "$base_ref" HEAD)

          touches_manifest=0
          if [ "${#scoped[@]}" -gt 0 ]; then
            touches_manifest=1
          fi

          if [ "$touches_manifest" = "1" ]; then
            declared=$(git log -1 --format="%(trailers:key=$TRAILER,valueonly)" HEAD | tr -d '[:space:]')
            if [ -z "$declared" ]; then
              echo "::error::配布対象ファイルを変更する PR には $TRAILER トレーラが必要です。push スキル経由でコミットしてください"
              fail=1
            else
              resolved=$(git rev-parse --verify --quiet "${declared}^{commit}" || true)
              if [ "$resolved" != "$main_sha" ]; then
                echo "::error::$TRAILER: $declared は main HEAD ($main_sha) と一致しません。古い base からのコピーで他プロジェクトの変更を巻き戻す恐れがあります。kit を pull し直してからやり直してください"
                fail=1
              else
                echo "鮮度 OK: $TRAILER = $declared (= main HEAD)"
              fi
            fi
          else
            echo "配布対象ファイルの変更なし。鮮度チェックをスキップします"
          fi

          # ---- 2. 混入 ----
          # スコープは配布対象ファイルのみ（鮮度チェックと同じ）。この grep が守るのは
          # 「配布ペイロードが特定のプロジェクトに依存しないこと」であり、配布されない
          # ファイル（src/・設計文書・このワークフロー自身）まで見ると、経緯として
          # プロジェクト名に言及する正当な文書のたびに赤くなり Kit-Grep-Mention が
          # 常態化して検査が形骸化する。
          #
          # 追加行の抽出に grep を挟むと、パターン不正による異常終了 (exit 2) と
          # 「一致なし」(exit 1) を呼び出し側で区別できず、`|| true` が検査そのものの
          # 失敗を握り潰す。抽出は awk で行い、grep は照合だけに使って exit 2 を弾く。
          added=""
          if [ "${#scoped[@]}" -gt 0 ]; then
            added=$(git diff "$base_ref" HEAD -- "${scoped[@]}" | awk '/^\+\+\+/ { next } /^\+/ { print }')
          fi

          hits=""
          if [ -n "$added" ]; then
            set +e
            hits=$(printf '%s\n' "$added" | grep -inE "$FORBIDDEN")
            rc=$?
            set -e
            if [ "$rc" -gt 1 ]; then
              echo "::error::禁止語の grep が異常終了しました (exit $rc)。FORBIDDEN パターンを確認してください"
              exit 1
            fi
          fi

          if [ -n "$hits" ]; then
            mention=$(git log -1 --format='%(trailers:key=Kit-Grep-Mention,valueonly)' HEAD | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            printf '%s\n' "$hits"
            if [ -z "$mention" ]; then
              echo "::error::追加行にコピー元プロジェクト固有名が含まれます。スタック層は特定プロジェクトに依存してはなりません。言及であって依存ではない場合は HEAD コミットに 'Kit-Grep-Mention: <理由>' トレーラを付けてください"
              fail=1
            else
              echo "::warning::追加行にプロジェクト固有名がありますが Kit-Grep-Mention により通します: $mention"
            fi
          else
            echo "混入 OK: 追加行に禁止語なし"
          fi

          # ---- 3. 審査スコープの宣言漏れ ----
          # push 前審査のスコープは「変更 ∩ (フックの MANDATORY_SCOPE ∪ マニフェスト ∪
          # $SCOPE の review_extra)」で決まる。スコープから漏れたパスは、外へ出るのに
          # 無審査で通る。
          #
          # 漏れる新しいパスが生まれる道は2つしかない。(a) 新しいトップレベルのパスが
          # 増える (b) 既存の scaffold スクリプトが変更される。(b) は scripts/ が
          # MANDATORY_SCOPE なのでエージェントが読む。ここで塞ぐのは (a) の方。
          #
          # 既存のトップレベルを全部列挙させる方式は採らない。無関係な構造変更のたびに
          # 赤くなり、宣言が儀式化する。増えたときだけ分類を強制する。
          new_top=$(comm -13 \
            <(git ls-tree --name-only "$base_ref" | sort) \
            <(git ls-tree --name-only HEAD | sort))

          if [ -n "$new_top" ]; then
            if [ ! -f "$SCOPE" ]; then
              echo "::error::トップレベルに $new_top が増えましたが $SCOPE がありません。審査対象かどうかを宣言してください"
              fail=1
            else
              while IFS= read -r top; do
                [ -z "$top" ] && continue
                # 宣言ファイル自身に自分を宣言させても意味がない。フック側では常に
                # 審査対象として扱われる（縮められると審査そのものを外せるため）。
                [ "$top" = "$SCOPE" ] && continue
                entry=$(jq -c --arg t "$top" '
                          [(.review_extra // [])[], (.no_review // [])[]]
                          | map(select(.path == $t or .path == ($t + "/")))
                          | first // empty
                        ' "$SCOPE")

                if [ -z "$entry" ]; then
                  echo "::error::トップレベルに $top が増えましたが $SCOPE で分類されていません。審査すべきなら review_extra に、不要なら no_review に、理由を添えて宣言してください"
                  fail=1
                # 理由の無い宣言は素通りさせない。パスを1行足すだけで分類したことに
                # できるなら、宣言はゴム印になり、何を守っているのか誰も答えられなくなる。
                # フック側は review_extra の reason を検証するが、no_review は読まないため、
                # ここが no_review の唯一の歯止めになる。
                elif ! printf '%s' "$entry" | jq -e '(.reason? // "") | test("\\S")' >/dev/null; then
                  echo "::error::$SCOPE の $top に reason がありません。なぜ審査対象なのか／なぜ不要なのかを書いてください"
                  fail=1
                else
                  echo "審査スコープ OK: $top は $SCOPE で宣言済み"
                fi
              done <<< "$new_top"
            fi
          else
            echo "審査スコープ OK: トップレベルの増加なし"
          fi

          exit "$fail"
