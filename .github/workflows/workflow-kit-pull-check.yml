name: workflow-kit-pull-check

# claude-workflow-kit（coreの正、PUBLIC）との差分を毎日チェックし、
# 差分があれば .claude/manifests/workflow-kit-files.txt の対象ファイルを自リポジトリへ反映してPRを立てる。
# 自動マージはしない（PR発行止まり）。

on:
  schedule:
    - cron: '0 0 * * *' # UTC 0時 = JST朝9時
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    # このファイル自身が core として claude-workflow-kit 経由で配布される。
    # 正のリポジトリでは自分自身との差分検知になるため走らせない。
    if: github.repository != 'bibito-/claude-workflow-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone claude-workflow-kit
        run: git clone --depth 1 https://github.com/bibito-/claude-workflow-kit.git /tmp/claude-workflow-kit

      - name: Diff manifest files
        id: diff
        run: |
          set -euo pipefail

          kit_sha=$(git -C /tmp/claude-workflow-kit rev-parse HEAD)
          echo "claude-workflow-kit HEAD: $kit_sha"

          body_file=/tmp/pr_body.md
          echo "claude-workflow-kit (\`$kit_sha\`) との差分検知による自動更新:" > "$body_file"
          echo "" >> "$body_file"
          changed=0

          # マニフェスト自身も同期対象なので、先にこれを取り込む。
          # 古いマニフェストで回すと、kit が core に追加したファイルを取りこぼす。
          manifest_path=.claude/manifests/workflow-kit-files.txt
          src_manifest="/tmp/claude-workflow-kit/$manifest_path"
          if [ -f "$src_manifest" ] && ! diff -q "$src_manifest" "$manifest_path" > /dev/null 2>&1; then
            cp "$src_manifest" "$manifest_path"
            echo "- \`$manifest_path\`" >> "$body_file"
            changed=1
          fi

          # ループ中に cp がマニフェストを上書きしうる。入力fdを実ファイルに
          # 繋いだままだと読み込み位置がずれ、以降のエントリが黙って読み飛ばされる。
          manifest=/tmp/workflow-kit-files.snapshot
          cp "$manifest_path" "$manifest"

          while IFS= read -r path; do
            [ -z "$path" ] && continue

            if [[ "$path" == */ ]]; then
              src_dir="/tmp/claude-workflow-kit/${path}"
              [ -d "$src_dir" ] || { echo "::warning::${path} が claude-workflow-kit に存在しません（スキップ）"; continue; }
              while IFS= read -r -d '' src_file; do
                rel="${src_file#/tmp/claude-workflow-kit/}"
                if ! diff -q "$src_file" "$rel" > /dev/null 2>&1; then
                  mkdir -p "$(dirname "$rel")"
                  cp "$src_file" "$rel"
                  echo "- \`$rel\`" >> "$body_file"
                  changed=1
                fi
              done < <(find "$src_dir" -type f -name '*.js' -print0)
              continue
            fi

            src="/tmp/claude-workflow-kit/$path"
            if [ ! -f "$src" ]; then
              echo "::warning::${path} が claude-workflow-kit に存在しません（スキップ）"
              continue
            fi

            # GITHUB_TOKEN は .github/workflows/ の作成・更新を拒否する
            # (refusing to allow a GitHub App to create or update workflow ... without `workflows` permission)。
            # 自動PRに含めると push が弾かれるため、CI では適用せず差分の存在だけ知らせる。
            # 実際の取り込みは人間が /workflow-kit-pull を実行したときに行う。
            if [[ "$path" == .github/* ]]; then
              if ! diff -q "$src" "$path" > /dev/null 2>&1; then
                echo "::warning::${path} に差分があります。CIでは適用できません。ローカルで /workflow-kit-pull を実行してください"
              fi
              continue
            fi

            if ! diff -q "$src" "$path" > /dev/null 2>&1; then
              mkdir -p "$(dirname "$path")"
              cp "$src" "$path"
              echo "- \`$path\`" >> "$body_file"
              changed=1
            fi
          done < "$manifest"

          # base SHA はファイル差分の有無に関わらず現在の kit HEAD を記録する。
          # kit が進んだが core ファイルに差分がない場合でも base を進めないと、
          # 手動の /workflow-kit-push が base 不一致で偽陽性のまま弾かれ続ける。
          # base SHA はプロジェクト固有の同期状態なのでマニフェストには載せない。
          base_file=.claude/manifests/workflow-kit-base.txt
          current_base=$(cat "$base_file" 2>/dev/null || echo "")
          if [ "$current_base" != "$kit_sha" ]; then
            echo "$kit_sha" > "$base_file"
            echo "- \`$base_file\` (base SHA: \`${current_base:-none}\` → \`$kit_sha\`)" >> "$body_file"
            changed=1
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: workflow-kit-pull自動検知によるclaude-workflow-kit差分反映"
          branch: workflow-kit-pull/auto
          title: "workflow-kit-pull: claude-workflow-kitとの差分を反映"
          body-path: /tmp/pr_body.md
