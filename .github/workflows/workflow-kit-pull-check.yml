name: workflow-kit-pull-check

# claude-workflow-kit（coreの正、PUBLIC）との差分を毎日チェックし、
# 差分があれば対象ファイルを自リポジトリへ反映してPRを立てる。
# 対象ファイル一覧は .claude/manifests/workflow-kit-files.txt を単一の正として参照する。
# 自動マージはしない（PR発行止まり）。
#
# 取り込みの方向は base SHA を共通祖先とした三方向比較で決める。
# プロジェクト側が先行しているファイルを kit の内容で巻き戻さないため。

on:
  schedule:
    - cron: '0 0 * * *' # UTC 0時 = JST朝9時
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    # このファイル自身が core として claude-workflow-kit 経由で配布される。
    # 正のリポジトリでは自分自身との差分検知になるため走らせない。
    if: github.repository != 'bibito-/claude-workflow-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          # conflict 報告に「このファイルを追加したコミット」を添えるため全履歴を取る
          fetch-depth: 0

      - name: Clone claude-workflow-kit
        # conflict 報告用に kit 側の追加コミット情報も引くため shallow にしない
        run: git clone https://github.com/bibito-/claude-workflow-kit.git /tmp/claude-workflow-kit

      - name: Diff manifest files
        id: diff
        run: |
          set -euo pipefail

          KIT=/tmp/claude-workflow-kit
          kit_sha=$(git -C "$KIT" rev-parse HEAD)
          echo "claude-workflow-kit HEAD: $kit_sha"

          base_file=.claude/manifests/workflow-kit-base.txt
          base_sha=$(cat "$base_file" 2>/dev/null || echo "")
          echo "base SHA: ${base_sha:-none}"

          # 共通祖先のブロブを base コミットから読めることを確認する。
          # 全履歴クローンなら通常 HEAD から到達可能だが、force-push で履歴から
          # 消えた SHA は fetch で拾い直す。それでも取れない場合（base 未設定等）は
          # 方向判別せず、安全側に倒す。
          ancestor_ok=0
          if [ -n "$base_sha" ] && { git -C "$KIT" cat-file -e "$base_sha^{commit}" 2>/dev/null || git -C "$KIT" fetch origin "$base_sha" -q 2>/dev/null; }; then
            ancestor_ok=1
          else
            echo "::notice::共通祖先 (${base_sha:-none}) を取得できません。差分のあるファイルは適用せず警告します"
          fi

          # base(共通祖先) / kit / project の三方向比較で取り込み方向を決める。
          #   same       … 差分なし
          #   kit        … kit だけが変更 → 取り込む
          #   local      … project だけが変更 → 取り込まない（push を促す）
          #   conflict   … 双方が変更、または祖先に無い同名ファイルが双方に存在 → 適用せず報告する
          #   noancestor … 祖先不明 → 適用しない
          classify() {
            local p="$1" src="$KIT/$1"
            [ -f "$p" ] || { echo kit; return; }
            if diff -q "$src" "$p" > /dev/null 2>&1; then echo same; return; fi
            if [ "$ancestor_ok" != "1" ]; then echo noancestor; return; fi
            local b=/tmp/base_blob
            if ! git -C "$KIT" show "$base_sha:$p" > "$b" 2>/dev/null; then
              # 祖先に無いが project 側にも存在し内容が違う。「kit の新規追加」と
              # 「project が独自に作った同名ファイル」を内容だけでは区別できないため、
              # kit と断定せず conflict に倒す（project 独自ファイルの上書きを防ぐ）。
              echo conflict; return
            fi
            local kit_same=1 proj_same=1
            diff -q "$b" "$src" > /dev/null 2>&1 || kit_same=0
            diff -q "$b" "$p"   > /dev/null 2>&1 || proj_same=0
            if [ "$kit_same" = "0" ] && [ "$proj_same" = "1" ]; then echo kit
            elif [ "$kit_same" = "1" ] && [ "$proj_same" = "0" ]; then echo local
            else echo conflict; fi
          }

          body_file=/tmp/pr_body.md
          echo "claude-workflow-kit (\`$kit_sha\`) との差分検知による自動更新:" > "$body_file"
          echo "" >> "$body_file"
          changed=0
          # 取り込み切れなかったファイルが1つでもあれば base を進めない。
          # 進めてしまうと共通祖先が kit と一致し、未取り込みのファイルが
          # 翌回から「project が先行」と誤分類されて永久に同期されなくなる。
          blocked=0

          # 手動解決のとっかかりとして「そのファイルを追加したコミット」を返す。
          # ファイル内の自己申告ではなく git 履歴から引くので維持コストも改竄もない。
          added_info() {
            local info
            info=$(git -C "$1" log --diff-filter=A -1 --date=short --format='%h %ad %s' -- "$2" 2>/dev/null || true)
            echo "${info:-追加コミット不明}"
          }

          # 1ファイルを分類し、kit 方向のときだけ適用する。
          apply_one() {
            local path="$1" src="$KIT/$1" verdict
            verdict=$(classify "$path")
            case "$verdict" in
              same) ;;
              kit)
                # GITHUB_TOKEN は .github/workflows/ の作成・更新を拒否する
                # (refusing to allow a GitHub App to create or update workflow ... without `workflows` permission)。
                # 自動PRに含めると push が弾かれるため、CI では適用せず差分の存在だけ知らせる。
                if [[ "$path" == .github/* ]]; then
                  echo "::warning::${path} に kit 側の更新があります。CIでは適用できません。ローカルで /workflow-kit-pull を実行してください"
                  blocked=1
                  return
                fi
                mkdir -p "$(dirname "$path")"
                cp "$src" "$path"
                echo "- \`$path\`" >> "$body_file"
                changed=1
                ;;
              local)
                # local は定常状態（base は進む・対応不要）。warning は blocked=1 のものに限る。
                echo "::notice::${path} はこのリポジトリ側が先行しています。巻き戻さず据え置きました。/workflow-kit-push で kit へ反映してください"
                ;;
              conflict)
                echo "::warning::${path} は kit とこのリポジトリで内容が異なり、方向を自動判別できません（双方の変更、または双方で独立に作成）。手動で確認してください。project側追加: $(added_info . "$path") / kit側追加: $(added_info "$KIT" "$path")"
                blocked=1
                ;;
              noancestor)
                echo "::warning::${path} に差分がありますが共通祖先を取得できず方向を判別できません。適用しません。project側追加: $(added_info . "$path") / kit側追加: $(added_info "$KIT" "$path")"
                blocked=1
                ;;
            esac
          }

          # マニフェスト自身も同期対象なので、先にこれを取り込む。
          # 古いマニフェストで回すと、kit が core に追加したファイルを取りこぼす。
          manifest_path=.claude/manifests/workflow-kit-files.txt
          [ -f "$KIT/$manifest_path" ] && apply_one "$manifest_path"

          # ループ中に cp がマニフェストを上書きしうる。入力fdを実ファイルに
          # 繋いだままだと読み込み位置がずれ、以降のエントリが黙って読み飛ばされる。
          manifest=/tmp/workflow-kit-files.snapshot
          cp "$manifest_path" "$manifest"

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            [ "$path" = "$manifest_path" ] && continue

            if [[ "$path" == */ ]]; then
              src_dir="$KIT/${path}"
              [ -d "$src_dir" ] || { echo "::notice::${path} が claude-workflow-kit に存在しません（スキップ）"; continue; }
              # 拡張子で絞らない。マニフェストのディレクトリ行は「配下すべて」を意味する。
              # 旧版は '*.js' だけを拾っていたため、.cjs のフック（ESM プロジェクトでも
              # CommonJS として動かすために必要な拡張子）と INDEX.md が自動 pull で
              # 一度も配られていなかった。
              while IFS= read -r -d '' src_file; do
                apply_one "${src_file#$KIT/}"
              done < <(find "$src_dir" -type f -print0)
              continue
            fi

            if [ ! -f "$KIT/$path" ]; then
              echo "::notice::${path} が claude-workflow-kit に存在しません（スキップ）"
              continue
            fi
            apply_one "$path"
          done < "$manifest"

          # フック登録を settings.json へマージする。
          # settings.json 自体は配布できない（プロジェクトごとに permissions・MCP 設定が
          # 異なり、上書きすると壊れる）。しかし登録が無ければフックは一度も発火しない。
          # 発火しないゲートは無いより悪いので、不足分の登録だけを足す。既存エントリは触らない。
          merge_script=.claude/scripts/merge-hook-registrations.cjs
          if [ -f "$merge_script" ] && [ -f .claude/manifests/hook-registrations.json ]; then
            if node "$merge_script"; then
              if ! git diff --quiet -- .claude/settings.json 2>/dev/null; then
                echo "- \`.claude/settings.json\` (フック登録の追記)" >> "$body_file"
                changed=1
              fi
            else
              echo "::warning::フック登録のマージに失敗しました。ローカルで node $merge_script を実行してください"
            fi
          fi

          # base SHA はファイル差分の有無に関わらず現在の kit HEAD を記録する。
          # kit が進んだが core ファイルに差分がない場合でも base を進めないと、
          # 手動の /workflow-kit-push が base 不一致で偽陽性のまま弾かれ続ける。
          # base SHA はプロジェクト固有の同期状態なのでマニフェストには載せない。
          if [ "$blocked" = "1" ]; then
            echo "::warning::取り込めなかったファイルがあるため base SHA を進めません（現在: ${base_sha:-none}）"
          elif [ "$base_sha" != "$kit_sha" ]; then
            echo "$kit_sha" > "$base_file"
            echo "- \`$base_file\` (base SHA: \`${base_sha:-none}\` → \`$kit_sha\`)" >> "$body_file"
            changed=1
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: workflow-kit-pull自動検知によるclaude-workflow-kit差分反映"
          branch: workflow-kit-pull/auto
          title: "workflow-kit-pull: claude-workflow-kitとの差分を反映"
          body-path: /tmp/pr_body.md
