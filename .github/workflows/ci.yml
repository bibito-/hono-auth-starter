name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 依存関係を変更しなくても新規CVEを定期検知するため週次実行
    - cron: "0 0 * * 1"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level=high
