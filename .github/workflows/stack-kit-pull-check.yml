name: stack-kit-pull-check

# hono-auth-starter（Hono+Supabaseスタックの正、PRIVATE）との差分を毎日チェックし、
# 差分があれば対象ファイルを自リポジトリへ反映してPRを立てる。
# 対象ファイル一覧は .claude/manifests/stack-kit-files.txt を単一の正として参照する。
# 自動マージはしない（PR発行止まり）。
#
# 取り込みの方向は base SHA を共通祖先とした三方向比較で決める。
# プロジェクト側が先行しているファイルを kit の内容で巻き戻さないため。

on:
  schedule:
    - cron: '0 0 * * *' # UTC 0時 = JST朝9時
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    # このファイル自身がスタック層として hono-auth-starter 経由で配布される。
    # 正のリポジトリでは自分自身との差分検知になるため走らせない。
    if: github.repository != 'bibito-/hono-auth-starter'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      # hono-auth-starter は PRIVATE のため PAT が要る。
      # checkout の path は workspace 内に限られるので .stack-kit-src に置き、
      # diff 後に必ず削除して PR に混入させない。
      - name: Checkout hono-auth-starter
        uses: actions/checkout@v4
        with:
          repository: bibito-/hono-auth-starter
          token: ${{ secrets.STACK_KIT_PAT }}
          path: .stack-kit-src

      - name: Diff manifest files
        id: diff
        run: |
          set -euo pipefail

          # .stack-kit-src は後続ステップで削除されるため、SHA はここで取る。
          KIT=.stack-kit-src
          kit_sha=$(git -C "$KIT" rev-parse HEAD)
          echo "hono-auth-starter HEAD: $kit_sha"

          base_file=.claude/manifests/stack-kit-base.txt
          base_sha=$(cat "$base_file" 2>/dev/null || echo "")
          echo "base SHA: ${base_sha:-none}"

          # 共通祖先のブロブを読むために base コミットだけ取り寄せる。
          # actions/checkout が認証情報を保持しているので private でも fetch できる。
          # 取れない場合（base 未設定・force-push で消えた等）は方向判別せず、安全側に倒す。
          ancestor_ok=0
          if [ -n "$base_sha" ] && git -C "$KIT" fetch --depth=1 origin "$base_sha" -q 2>/dev/null; then
            ancestor_ok=1
          else
            echo "::notice::共通祖先 (${base_sha:-none}) を取得できません。差分のあるファイルは適用せず警告します"
          fi

          # base(共通祖先) / kit / project の三方向比較で取り込み方向を決める。
          #   same       … 差分なし
          #   kit        … kit だけが変更 → 取り込む
          #   local      … project だけが変更 → 取り込まない（push を促す）
          #   conflict   … 双方が変更 → 適用せず報告する
          #   noancestor … 祖先不明 → 適用しない
          classify() {
            local p="$1" src="$KIT/$1"
            [ -f "$p" ] || { echo kit; return; }
            if diff -q "$src" "$p" > /dev/null 2>&1; then echo same; return; fi
            if [ "$ancestor_ok" != "1" ]; then echo noancestor; return; fi
            local b=/tmp/base_blob
            if ! git -C "$KIT" show "$base_sha:$p" > "$b" 2>/dev/null; then
              echo kit; return   # 祖先に無い = kit で新規追加された
            fi
            local kit_same=1 proj_same=1
            diff -q "$b" "$src" > /dev/null 2>&1 || kit_same=0
            diff -q "$b" "$p"   > /dev/null 2>&1 || proj_same=0
            if [ "$kit_same" = "0" ] && [ "$proj_same" = "1" ]; then echo kit
            elif [ "$kit_same" = "1" ] && [ "$proj_same" = "0" ]; then echo local
            else echo conflict; fi
          }

          body_file=/tmp/pr_body.md
          echo "hono-auth-starter (\`$kit_sha\`) との差分検知による自動更新:" > "$body_file"
          echo "" >> "$body_file"
          changed=0
          # 取り込み切れなかったファイルが1つでもあれば base を進めない。
          # 進めてしまうと共通祖先が kit と一致し、未取り込みのファイルが
          # 翌回から「project が先行」と誤分類されて永久に同期されなくなる。
          blocked=0

          # 1ファイルを分類し、kit 方向のときだけ適用する。
          apply_one() {
            local path="$1" src="$KIT/$1" verdict
            verdict=$(classify "$path")
            case "$verdict" in
              same) ;;
              kit)
                # GITHUB_TOKEN は .github/workflows/ の作成・更新を拒否する
                # (refusing to allow a GitHub App to create or update workflow ... without `workflows` permission)。
                # 自動PRに含めると push が弾かれるため、CI では適用せず差分の存在だけ知らせる。
                if [[ "$path" == .github/* ]]; then
                  echo "::warning::${path} に kit 側の更新があります。CIでは適用できません。ローカルで /stack-kit-pull を実行してください"
                  blocked=1
                  return
                fi
                mkdir -p "$(dirname "$path")"
                cp "$src" "$path"
                echo "- \`$path\`" >> "$body_file"
                changed=1
                ;;
              local)
                # local は定常状態（base は進む・対応不要）。warning は blocked=1 のものに限る。
                echo "::notice::${path} はこのリポジトリ側が先行しています。巻き戻さず据え置きました。/stack-kit-push で kit へ反映してください"
                ;;
              conflict)
                echo "::warning::${path} は kit とこのリポジトリの双方が変更しています。自動では解決できません。手動で確認してください"
                blocked=1
                ;;
              noancestor)
                echo "::warning::${path} に差分がありますが共通祖先を取得できず方向を判別できません。適用しません"
                blocked=1
                ;;
            esac
          }

          # マニフェスト自身も同期対象なので、先にこれを取り込む。
          # 古いマニフェストで回すと、kit がスタック層に追加したファイルを取りこぼす。
          manifest_path=.claude/manifests/stack-kit-files.txt
          [ -f "$KIT/$manifest_path" ] && apply_one "$manifest_path"

          # ループ中に cp がマニフェストを上書きしうる。入力fdを実ファイルに
          # 繋いだままだと読み込み位置がずれ、以降のエントリが黙って読み飛ばされる。
          manifest=/tmp/stack-kit-files.snapshot
          cp "$manifest_path" "$manifest"

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            [ "$path" = "$manifest_path" ] && continue
            if [ ! -f "$KIT/$path" ]; then
              echo "::notice::${path} が hono-auth-starter に存在しません（スキップ）"
              continue
            fi
            apply_one "$path"
          done < "$manifest"

          # base SHA はファイル差分の有無に関わらず現在の kit HEAD を記録する。
          # kit が進んだがスタック層に差分がない場合でも base を進めないと、
          # 手動の /stack-kit-push が base 不一致で偽陽性のまま弾かれ続ける。
          # base SHA はプロジェクト固有の同期状態なのでマニフェストには載せない。
          if [ "$blocked" = "1" ]; then
            echo "::warning::取り込めなかったファイルがあるため base SHA を進めません（現在: ${base_sha:-none}）"
          elif [ "$base_sha" != "$kit_sha" ]; then
            echo "$kit_sha" > "$base_file"
            echo "- \`$base_file\` (base SHA: \`${base_sha:-none}\` → \`$kit_sha\`)" >> "$body_file"
            changed=1
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Remove hono-auth-starter checkout
        if: always()
        run: rm -rf .stack-kit-src

      - name: Create Pull Request
        if: steps.diff.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: stack-kit-pull自動検知によるhono-auth-starter差分反映"
          branch: stack-kit-pull/auto
          title: "stack-kit-pull: hono-auth-starterとの差分を反映"
          body-path: /tmp/pr_body.md
